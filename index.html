<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
      -webkit-app-region: no-drag;
    }

    #pet-wrap {
      position: absolute;
      top: 0;
      left: 0;
      width: 140px;
      height: 140px;
      will-change: transform;
      cursor: grab;
      user-select: none;
    }
    #pet-wrap.dragging { cursor: grabbing; }

    #pet {
      width: 140px;
      height: 140px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
      -webkit-user-drag: none;
      pointer-events: auto;
    }

    #pet.static-skin {
      image-rendering: auto;
      object-fit: contain;
      transform-origin: 50% 78%;
      filter: drop-shadow(0 8px 8px rgba(0,0,0,0.18));
    }
    #pet.static-skin.state-idle,
    #pet.static-skin.state-peek,
    #pet.static-skin.state-reading,
    #pet.static-skin.state-notification {
      animation: pet-breathe 2.6s ease-in-out infinite;
    }
    #pet.static-skin.state-typing,
    #pet.static-skin.state-thinking,
    #pet.static-skin.state-building,
    #pet.static-skin.state-debugger,
    #pet.static-skin.state-sweeping,
    #pet.static-skin.state-carrying,
    #pet.static-skin.state-juggling {
      animation: pet-work 0.7s ease-in-out infinite;
    }
    #pet.static-skin.state-happy,
    #pet.static-skin.state-jump {
      animation: pet-jump 0.8s cubic-bezier(.2,.8,.2,1) infinite;
    }
    #pet.static-skin.state-groove,
    #pet.static-skin.state-conducting,
    #pet.static-skin.state-walk {
      animation: pet-groove 0.9s ease-in-out infinite;
    }
    #pet.static-skin.state-annoyed,
    #pet.static-skin.state-error,
    #pet.static-skin.state-alert {
      animation: pet-shake 0.28s linear infinite;
    }
    #pet.static-skin.state-sleeping {
      animation: pet-sleep 3.2s ease-in-out infinite;
      opacity: 0.95;
    }

    @keyframes pet-breathe {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-6px) scale(1.03); }
    }
    @keyframes pet-work {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-3px) rotate(1deg); }
    }
    @keyframes pet-jump {
      0%, 100% { transform: translateY(0) scale(1); }
      45% { transform: translateY(-18px) scale(1.06); }
      70% { transform: translateY(2px) scale(0.98); }
    }
    @keyframes pet-groove {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      50% { transform: translateY(-7px) rotate(5deg); }
    }
    @keyframes pet-shake {
      0%, 100% { transform: translateX(0) rotate(0); }
      25% { transform: translateX(-3px) rotate(-3deg); }
      75% { transform: translateX(3px) rotate(3deg); }
    }
    @keyframes pet-sleep {
      0%, 100% { transform: translateY(0) rotate(-2deg) scale(0.98); }
      50% { transform: translateY(3px) rotate(2deg) scale(1); }
    }

    /* Status dot — appears in lower-right corner of the crab's body */
    #status-dot {
      position: absolute;
      bottom: 24px;
      right: 38px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      border: 1.5px solid rgba(255,255,255,0.95);
      box-shadow: 0 1px 2px rgba(0,0,0,0.3);
      pointer-events: none;
    }
    #status-dot.thinking { background: #facc15; animation: pulse 1s infinite; }
    #status-dot.working  { background: #f97316; animation: pulse 0.5s infinite; }
    #status-dot.done     { background: #60a5fa; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.85); }
    }

    /* Speech bubble — sits above the crab */
    #bubble {
      position: absolute;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      border: 1.5px solid #e07b39;
      border-radius: 10px;
      padding: 5px 10px;
      font: 500 11px -apple-system, 'SF Pro Text', 'PingFang SC', sans-serif;
      white-space: nowrap;
      pointer-events: none;
      display: none;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      color: #333;
      max-width: 240px;
    }
    #bubble::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: #e07b39;
    }
    #status-dot.thinking { background: #facc15; animation: pulse 1s infinite; }
    #status-dot.working  { background: #f97316; animation: pulse 0.5s infinite; }
    #status-dot.done     { background: #60a5fa; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    canvas { display: block; }
  </style>
</head>
<body>
  <div id="pet-wrap">
    <div id="bubble"></div>
    <img id="pet" src="assets/gif/clawd-idle.gif" draggable="false" alt="Clawd">
    <div id="status-dot"></div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
